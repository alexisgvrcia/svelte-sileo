<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="robots" content="index, follow" />
        <meta
            name="googlebot"
            content="index, follow, max-video-preview:-1, max-image-preview:large, max-snippet:-1"
        />
        <title>Svelte-Sileo — Physics-based toast component for Svelte</title>
        <link rel="canonical" href="https://svelte-sileo.alexisgvrcia.dev/" />
        <meta
            name="description"
            content="An opinionated toast component for Svelte. Gooey SVG morphing, spring physics, and a minimal API — beautiful by default."
        />
        <meta name="author" content="alexisgvrcia" />
        <link rel="author" href="https://alexisgvrcia.dev" />

        <link rel="icon" href="%sveltekit.assets%/favicon.ico" />
        <link
            rel="icon"
            href="%sveltekit.assets%/icon.svg"
            type="image/svg+xml"
        />
        <link
            rel="apple-touch-icon"
            href="%sveltekit.assets%/apple-touch-icon.png"
            type="image/png"
            sizes="180x180"
        />

        <meta property="og:type" content="website" />
        <meta property="og:site_name" content="Svelte-Sileo" />
        <meta property="og:title" content="Svelte-Sileo" />
        <meta
            property="og:description"
            content="An opinionated toast component for Svelte. Gooey SVG morphing, spring physics, and a minimal API — beautiful by default."
        />
        <meta property="og:url" content="https://svelte-sileo.alexisgvrcia.dev/" />
        <meta
            property="og:image"
            content="https://svelte-sileo.alexisgvrcia.dev/og-image.png"
        />
        <meta property="og:image:width" content="1200" />
        <meta property="og:image:height" content="630" />
        <meta
            property="og:image:alt"
            content="Svelte-Sileo — Physics-based toast component for Svelte"
        />

        <meta name="twitter:card" content="summary_large_image" />
        <meta name="twitter:title" content="Svelte-Sileo" />
        <meta
            name="twitter:description"
            content="An opinionated toast component for Svelte. Gooey SVG morphing, spring physics, and a minimal API — beautiful by default."
        />
        <meta name="twitter:creator" content="@alexisgvrcia" />
        <meta
            name="twitter:image"
            content="https://svelte-sileo.alexisgvrcia.dev/og-image.png"
        />
        <meta name="twitter:image:width" content="1200" />
        <meta name="twitter:image:height" content="630" />
        <meta
            name="twitter:image:alt"
            content="Svelte-Sileo — Physics-based toast component for Svelte"
        />
        %sveltekit.head%
    </head>
    <body data-sveltekit-preload-data="hover">
        <div style="display: contents">%sveltekit.body%</div>
    </body>
</html>
